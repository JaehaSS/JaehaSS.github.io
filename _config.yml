title: JaehaSS Blog
description: 개발 블로그 & 프로젝트 모음
url: "https://jaehass.github.io"
baseurl: ""

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

paginate: 6
paginate_path: "/page/:num/"

plugins:
  - jekyll-seo-tag
  - jekyll-paginate

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - destiny-numbers
