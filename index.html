<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JaehaSS - 프로젝트 모음</title>
  <meta name="description" content="JaehaSS의 웹 프로젝트 포트폴리오" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3433863606047889" crossorigin="anonymous"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a1a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
    .container{max-width:600px;text-align:center}
    h1{font-size:2rem;margin-bottom:.5rem;background:linear-gradient(to right,#d4a853,#fde68a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    p{color:#94a3b8;margin-bottom:2rem;font-size:.9rem}
    .projects{display:flex;flex-direction:column;gap:1rem;width:100%}
    a.card{display:flex;align-items:center;gap:1rem;padding:1.25rem 1.5rem;background:#12122a;border:1px solid #1e1e3a;border-radius:1rem;text-decoration:none;color:#e2e8f0;transition:border-color .2s,box-shadow .2s}
    a.card:hover{border-color:#d4a853;box-shadow:0 0 20px rgba(212,168,83,.15)}
    .card-icon{font-size:2rem}
    .card-text{text-align:left}
    .card-title{font-weight:700;font-size:1rem}
    .card-desc{font-size:.75rem;color:#64748b;margin-top:.25rem}
    footer{margin-top:3rem;font-size:.7rem;color:#334155}
  </style>
</head>
<body>
  <div class="container">
    <h1>JaehaSS</h1>
    <p>웹 프로젝트 모음</p>
    <div class="projects">
      <a class="card" href="/destiny-numbers/">
        <span class="card-icon">🔮</span>
        <div class="card-text">
          <div class="card-title">운명의 번호</div>
          <div class="card-desc">사주팔자 오행 기반 로또 번호 추천 &amp; 역대 당첨 시뮬레이션</div>
        </div>
      </a>
    </div>
    <footer>&copy; 2026 JaehaSS</footer>
  </div>
</body>
</html>
